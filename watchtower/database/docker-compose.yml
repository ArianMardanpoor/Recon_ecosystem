services:
  watchtower-api:
    build:
      context: ..
      dockerfile: database/Dockerfile  # به داکر می‌گوید فایل داکرفایل داخل پوشه دیتابیس است
    container_name: watchtower-backend
    ports:
      - "3131:3131"
    env_file:
      - ../.env   # watchtower/.env — MONGO_URI, WATCHTOWER_API_TOKEN, etc.
    environment:
      - GUNICORN_WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:3131/api/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional local MongoDB, only started when explicitly requested:
  #   docker compose --profile local-db up -d
  # Use this if you don't want to depend on Atlas (e.g. offline dev,
  # throwaway Codespaces environments). Point MONGO_URI in watchtower/.env
  # at `mongodb://localhost:27017/watchtower` to use it.
  mongo:
    image: mongo:7
    container_name: watchtower-mongo
    profiles:
      - local-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_local_data:/data/db
    restart: unless-stopped

volumes:
  mongo_local_data: