# Headers added to avoid WAF fingerprinting of nuclei's default request signature (see false-negative investigation, July 2026)
id: x9-canary-probe

info:
  name: X9 Canary Probe Matcher
  author: arian
  severity: info
  description: Detects reflection of harmless canary strings to identify vulnerable parameters.
  tags: canary, xss, reconnaissance

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8"
      Accept-Language: "en-US,en;q=0.9"

    matchers-condition: or
    matchers:
      - type: regex
        part: body
        regex:
          - "x9canary[a-z]{3}"

    extractors:
      - type: regex
        part: body
        regex:
          - "x9canary[a-z]{3}"
        group: 0