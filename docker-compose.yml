services:
  watchtower-api:
    build:
      context: ./watchtower
      dockerfile: database/Dockerfile.api
    container_name: watchtower-api
    command: python3 app.py
    ports:
      - "3131:3131"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - watchtower-net
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: watchtower-mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - watchtower-net


  recon-tools:
    build:
      context: .
      dockerfile: xsscanner/Dockerfile
    container_name: recon-tools
    env_file:
      - .env
    depends_on:
      - watchtower-api
    networks:
      - watchtower-net
    volumes:
      - recon-results:/xsscanner/results
    profiles:
      - manual


networks:
  watchtower-net:
    driver: bridge


volumes:
  recon-results:
  mongo-data:
