services:
  watchtower-api:
    build:
      context: ./watchtower
      dockerfile: database/Dockerfile.api
      network: host 
    container_name: watchtower-api
    command: python3 app.py
    ports:
      - "3131:3131"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - watchtower-net
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: watchtower-mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - watchtower-net

  recon-tools:
    build:
      context: .
      dockerfile: xsscanner/Dockerfile
      network: host # <--- اجبار BuildKit به استفاده از اینترنت هاست برای نصب ابزارهای اسکنر
    container_name: recon-tools
    env_file:
      - .env
    depends_on:
      - watchtower-api
    networks:
      - watchtower-net
    volumes:
      - recon-results:/xsscanner/results
      - ./.env:/watchtower/.env:ro 
      - ./.env:/xsscanner/.env:ro
      - ./.env:/.env:ro
    profiles:
      - manual

networks:
  watchtower-net:
    driver: bridge

volumes:
  recon-results:
  mongo-data: